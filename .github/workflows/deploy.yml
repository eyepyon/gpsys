name: Deploy

# mainブランチへのpush（マージ）をトリガーに、以下を行う。
#   1. APIRun / InferRun / 居抜き物件同期サービスの3つのコンテナイメージを
#      ビルドし、Artifact Registryへプッシュする
#   2. Terraformを適用し、Cloud Run / Cloud Run Jobs / Cloud SQL等を
#      最新のイメージ・構成で更新する
#
# GCPへの認証はWorkload Identity Federation（キーレス認証）を用いる。
# サービスアカウントキー（JSON）はリポジトリ・GitHub Secrets/Variablesの
# いずれにも保存しない。
#
# 【Secrets / Variablesの使い分け】
# プロジェクトID・サービスアカウントのメールアドレス・バケット名等、値自体に
# 秘匿性が無い識別子はリポジトリの Variables（`vars.*`）として登録し、
# DBパスワード・Places APIキー等の真に機密な値のみを Secrets（`secrets.*`）
# として登録する（GitHub Actionsのログ上ではVariablesの値はマスクされない
# ため、機密値を誤って登録しないよう注意すること）。
#
# 【前提】本ワークフローの実行には、事前にWorkload Identityプール・
# プロバイダ・デプロイ用サービスアカウントが作成済みである必要がある。
# `terraform/modules/github_actions_wif`モジュールを使ってTerraformで
# 作成することもできるが、その場合は`enable_github_actions_wif = true`を
# 指定する必要がある。手動構築済みのWIF環境（gcloudコマンド等で作成した
# Workload Identityプール・サービスアカウント）を使う場合は
# `enable_github_actions_wif = false`（デフォルト）のままでよい。
# どちらの方式でも、Terraformのtfstateとアプリの地域資源ファイルを共用する
# GCSバケット（`terraform/state/`と`resources/`のプレフィックスで用途を
# 分離）は別途作成しておく必要がある。詳細はdocs/deployment-guide.mdを参照。

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "terraform/**"
      - "migrations/**"
      - "docker/**"
      - "pyproject.toml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      apply_terraform:
        description: "trueの場合、イメージのビルド・プッシュ後にterraform applyを実行する"
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # Workload Identity Federationによるキーレス認証に必要

env:
  REGION: us-central1

jobs:
  test:
    name: デプロイ前テスト
    uses: ./.github/workflows/ci.yml

  build-and-push:
    name: コンテナイメージのビルド・プッシュ
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: api
            image_name: api
          - target: infer
            image_name: infer
          - target: vacant_sync
            image_name: vacant-sync
          - target: frontend
            image_name: frontend
    outputs:
      image_tag: ${{ steps.image_tag.outputs.tag }}

    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: イメージタグの決定（コミットSHA）
        id: image_tag
        run: echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: GCPへの認証（Workload Identity Federation）
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}
          # token_format=access_tokenにより、このステップで一度だけサービス
          # アカウントへのなりすまし（impersonation）を行いアクセストークンを
          # 取得する。`gcloud auth configure-docker`の認証情報ヘルパー経由では
          # docker push時に都度なりすましが再実行され、IAMバインディングの
          # 反映タイミングによって`iam.serviceAccounts.getAccessToken`が
          # 一時的に拒否される場合があるため、それを避ける。
          token_format: "access_token"

      - name: Artifact Registryへのdocker認証設定
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Docker Buildxのセットアップ
        uses: docker/setup-buildx-action@v3

      - name: ${{ matrix.target }} イメージのビルド・プッシュ
        id: build_push
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/${{ matrix.target }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/regional-revitalization/${{ matrix.image_name }}:${{ steps.image_tag.outputs.tag }}
            ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/regional-revitalization/${{ matrix.image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # provenance/sbomのアテステーションを無効化する。buildxのデフォルト
          # 動作ではアテステーション用の追加manifestリクエストがpush後に
          # 発生し、Artifact Registryへのトークン再要求時に
          # 「failed to authorize: DeadlineExceeded」が発生することがある
          # （既知の問題）。無効化することでpush処理をシンプルにし、
          # 一時的なネットワーク・認証タイムアウトの発生を抑える。
          provenance: false
          sbom: false

      - name: ${{ matrix.target }} イメージのビルド・プッシュ（リトライ）
        if: steps.build_push.outcome == 'failure'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/${{ matrix.target }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/regional-revitalization/${{ matrix.image_name }}:${{ steps.image_tag.outputs.tag }}
            ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/regional-revitalization/${{ matrix.image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  terraform-apply:
    name: Terraformの適用
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || inputs.apply_terraform }}
    environment: production

    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: GCPへの認証（Workload Identity Federation）
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Terraformのセットアップ
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: terraform init
        working-directory: terraform
        run: terraform init -backend-config="bucket=${{ vars.GCP_BUCKET_NAME }}"

      - name: terraform plan
        working-directory: terraform
        run: |
          terraform plan \
            -input=false \
            -var="project_id=${{ vars.GCP_PROJECT_ID }}" \
            -var="app_image=${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/regional-revitalization/api:${{ needs.build-and-push.outputs.image_tag }}" \
            -var="inference_image=${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/regional-revitalization/infer:${{ needs.build-and-push.outputs.image_tag }}" \
            -var="vacant_sync_image=${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/regional-revitalization/vacant-sync:${{ needs.build-and-push.outputs.image_tag }}" \
            -var="frontend_image=${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/regional-revitalization/frontend:${{ needs.build-and-push.outputs.image_tag }}" \
            -var="app_allow_unauthenticated=true" \
            -var="app_cors_allowed_origins=${{ vars.APP_CORS_ALLOWED_ORIGINS || 'https://inuki-804626259225.us-central1.run.app' }}" \
            -var="db_password=${{ secrets.TF_VAR_DB_PASSWORD }}" \
            -var="admin_initial_password=${{ secrets.ADMIN_INITIAL_PASSWORD }}" \
            -var="admin_places_api_key=${{ secrets.ADMIN_PLACES_API_KEY }}" \
            -var="storage_bucket_name=${{ vars.GCP_BUCKET_NAME }}" \
            -var="places_api_key=${{ secrets.PLACES_API_KEY }}" \
            -var="enable_github_actions_wif=${{ vars.ENABLE_GITHUB_ACTIONS_WIF || 'false' }}" \
            -var="github_repository=${{ github.repository }}" \
            -out=tfplan

      - name: terraform apply
        working-directory: terraform
        run: terraform apply -input=false -auto-approve tfplan
