<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>統計情報 - いぬきんじょ管理画面</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="admin-container">
  <h1 style="font-size:1.4rem;">統計情報</h1>
  <div id="error" class="admin-error" style="display:none;"></div>

  <div class="admin-card">
    <h2 style="font-size:1.05rem; margin-top:0;">収集状況</h2>
    <div class="admin-grid">
      <div class="admin-stat-box"><div id="all-store-count" class="value">-</div><div class="label">収集済み全店舗</div></div>
      <div class="admin-stat-box"><div id="vacant-store-count" class="value">-</div><div class="label">居抜き物件候補</div></div>
    </div>
  </div>

  <div class="admin-card">
    <h2 style="font-size:1.05rem; margin-top:0;">市町村別データ数（居抜き物件候補）</h2>
    <table class="admin-table"><thead><tr><th>市町村</th><th>件数</th></tr></thead>
      <tbody id="muni-vacant-rows"></tbody></table>
  </div>

  <div class="admin-card">
    <h2 style="font-size:1.05rem; margin-top:0;">業種別データ数（居抜き物件候補）</h2>
    <table class="admin-table"><thead><tr><th>業種タグ</th><th>件数</th></tr></thead>
      <tbody id="type-rows"></tbody></table>
  </div>

  <div class="admin-card">
    <h2 style="font-size:1.05rem; margin-top:0;">ベクトルDB クラスタ数</h2>
    <table class="admin-table"><thead><tr><th>カテゴリ</th><th>件数</th></tr></thead>
      <tbody id="cluster-rows"></tbody></table>
  </div>

  <div class="admin-card">
    <h2 style="font-size:1.05rem; margin-top:0;">ベクトルDB分布</h2>
    <p style="font-size:0.8rem; color:#6b7280;">
      居抜き物件の検索・分析に使うembeddingを2次元に圧縮した分布表示です。
    </p>
    <canvas id="vector-canvas" width="900" height="500" style="max-width:100%; border:1px solid #e5e7eb; border-radius:8px;"></canvas>
  </div>

</div>

<script src="common.js"></script>
<script>
requireLogin();
renderAdminNav("stats");

function fillTable(id, rows, keyName, valueName) {
  const tbody = document.getElementById(id);
  tbody.innerHTML = rows
    .map((r) => `<tr><td>${r[keyName] || "(未設定)"}</td><td>${r[valueName]}</td></tr>`)
    .join("");
}

function categoryColor(category) {
  let hash = 0;
  for (let i = 0; i < category.length; i++) {
    hash = (hash * 31 + category.charCodeAt(i)) % 360;
  }
  return `hsl(${hash}, 65%, 50%)`;
}

function drawScatter(points) {
  const canvas = document.getElementById("vector-canvas");
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (points.length === 0) {
    ctx.fillStyle = "#9ca3af";
    ctx.fillText("データがありません", 20, 30);
    return;
  }
  const xs = points.map((p) => p.x), ys = points.map((p) => p.y);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const pad = 30;
  const scaleX = (x) => maxX === minX ? canvas.width / 2 : pad + ((x - minX) / (maxX - minX)) * (canvas.width - pad * 2);
  const scaleY = (y) => maxY === minY ? canvas.height / 2 : canvas.height - pad - ((y - minY) / (maxY - minY)) * (canvas.height - pad * 2);
  for (const p of points) {
    ctx.beginPath();
    ctx.arc(scaleX(p.x), scaleY(p.y), 4, 0, 2 * Math.PI);
    ctx.fillStyle = categoryColor(p.category);
    ctx.globalAlpha = 0.75;
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

async function load() {
  const errorEl = document.getElementById("error");
  try {
    const [res, dashboardRes] = await Promise.all([
      adminFetch("/admin/stats"),
      adminFetch("/admin/dashboard"),
    ]);
    if (!res.ok) throw new Error(`統計情報の取得に失敗しました (HTTP ${res.status})`);
    const data = await res.json();
    if (dashboardRes.ok) {
      const dashboard = await dashboardRes.json();
      document.getElementById("all-store-count").textContent = dashboard.all_store_count;
      document.getElementById("vacant-store-count").textContent = dashboard.vacant_property_count;
    }

    fillTable("muni-vacant-rows", data.municipality_counts_vacant_properties, "municipality", "count");
    fillTable("type-rows", data.type_counts, "type_tag", "count");
    fillTable("cluster-rows", data.cluster_counts, "category", "count");
    drawScatter(data.vector_points);
  } catch (err) {
    errorEl.textContent = err.message;
    errorEl.style.display = "block";
  }
}
load();
</script>

</body>
</html>
