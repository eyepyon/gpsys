<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>統計情報 - いぬきんじょ管理画面</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="admin-container">
  <h1 style="font-size:1.4rem;">統計情報</h1>
  <div id="error" class="admin-error" style="display:none;"></div>

  <div class="admin-card">
    <h2 style="font-size:1.05rem; margin-top:0;">市町村別データ数（居抜き物件候補）</h2>
    <table class="admin-table"><thead><tr><th>市町村</th><th>件数</th></tr></thead>
      <tbody id="muni-vacant-rows"></tbody></table>
  </div>

  <div class="admin-card">
    <h2 style="font-size:1.05rem; margin-top:0;">業種別データ数（居抜き物件候補）</h2>
    <table class="admin-table"><thead><tr><th>業種タグ</th><th>件数</th></tr></thead>
      <tbody id="type-rows"></tbody></table>
  </div>

</div>

<script src="common.js"></script>
<script>
requireLogin();
renderAdminNav("stats");

function fillTable(id, rows, keyName, valueName) {
  const tbody = document.getElementById(id);
  tbody.innerHTML = rows
    .map((r) => `<tr><td>${r[keyName] || "(未設定)"}</td><td>${r[valueName]}</td></tr>`)
    .join("");
}

async function load() {
  const errorEl = document.getElementById("error");
  try {
    const res = await adminFetch("/admin/stats");
    if (!res.ok) throw new Error(`統計情報の取得に失敗しました (HTTP ${res.status})`);
    const data = await res.json();

    fillTable("muni-vacant-rows", data.municipality_counts_vacant_properties, "municipality", "count");
    fillTable("type-rows", data.type_counts, "type_tag", "count");
  } catch (err) {
    errorEl.textContent = err.message;
    errorEl.style.display = "block";
  }
}
load();
</script>

</body>
</html>
