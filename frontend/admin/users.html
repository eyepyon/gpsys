<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理ユーザー管理 - いぬきんじょ管理画面</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="admin-container">
  <h1 style="font-size:1.4rem;">管理ユーザー管理</h1>
  <p style="color:#6b7280; font-size:0.9rem;">
    管理画面にログインできるユーザーを管理します。現状は全ユーザーがフル管理者権限です
    （role列は将来の権限分離用に予約されています）。
  </p>

  <div id="error" class="admin-error" style="display:none;"></div>

  <div class="admin-card">
    <h2 style="font-size:1.05rem; margin-top:0;">新規ユーザーの追加</h2>
    <form id="create-form" class="admin-form">
      <div style="display:flex; gap:1rem;">
        <div style="flex:1;">
          <label>ユーザー名</label>
          <input id="new_username" type="text" required />
        </div>
        <div style="flex:1;">
          <label>表示名</label>
          <input id="new_display_name" type="text" required />
        </div>
        <div style="flex:1;">
          <label>パスワード（8文字以上）</label>
          <input id="new_password" type="password" minlength="8" required />
        </div>
      </div>
      <button type="submit" class="admin-btn" style="margin-top:1rem;">追加</button>
    </form>
  </div>

  <div class="admin-card">
    <h2 style="font-size:1.05rem; margin-top:0;">ユーザー一覧</h2>
    <table class="admin-table">
      <thead>
        <tr>
          <th>ユーザー名</th>
          <th>表示名</th>
          <th>権限</th>
          <th>状態</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="user-rows"></tbody>
    </table>
  </div>
</div>

<script src="common.js"></script>
<script>
requireLogin();
renderAdminNav("users");

let currentUsername = null;

async function loadCurrentUser() {
  const res = await adminFetch("/admin/auth/me");
  if (res.ok) {
    const me = await res.json();
    currentUsername = me.username;
  }
}

async function loadUsers() {
  const errorEl = document.getElementById("error");
  errorEl.style.display = "none";
  try {
    const res = await adminFetch("/admin/users");
    if (!res.ok) throw new Error(`一覧の取得に失敗しました (HTTP ${res.status})`);
    const users = await res.json();
    const tbody = document.getElementById("user-rows");
    tbody.innerHTML = "";
    for (const u of users) {
      const tr = document.createElement("tr");
      const isSelf = u.username === currentUsername;
      const isInitialAdmin = u.username === "admin";
      tr.innerHTML = `
        <td>${u.username}${isSelf ? " (自分)" : ""}</td>
        <td>${u.display_name}</td>
        <td>${u.role}</td>
        <td>${u.is_active ? "有効" : "無効"}</td>
        <td>
          <button class="admin-btn secondary toggle-btn" data-id="${u.admin_user_id}" data-active="${u.is_active}" ${isInitialAdmin ? "disabled" : ""}>
            ${u.is_active ? "無効化" : "有効化"}
          </button>
          <button class="admin-btn danger delete-btn" data-id="${u.admin_user_id}" ${isSelf || isInitialAdmin ? "disabled" : ""}>
            削除
          </button>
        </td>
      `;
      tbody.appendChild(tr);
    }

    tbody.querySelectorAll(".toggle-btn").forEach((btn) => {
      btn.addEventListener("click", async () => {
        const id = btn.dataset.id;
        const active = btn.dataset.active === "true";
        await adminFetch(`/admin/users/${id}`, {
          method: "PATCH",
          body: JSON.stringify({ is_active: !active }),
        });
        loadUsers();
      });
    });
    tbody.querySelectorAll(".delete-btn").forEach((btn) => {
      btn.addEventListener("click", async () => {
        if (!confirm("このユーザーを削除しますか？")) return;
        const id = btn.dataset.id;
        const res = await adminFetch(`/admin/users/${id}`, { method: "DELETE" });
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          alert(body.detail || "削除に失敗しました");
        }
        loadUsers();
      });
    });
  } catch (err) {
    errorEl.textContent = err.message;
    errorEl.style.display = "block";
  }
}

document.getElementById("create-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const errorEl = document.getElementById("error");
  errorEl.style.display = "none";
  const username = document.getElementById("new_username").value.trim();
  const display_name = document.getElementById("new_display_name").value.trim();
  const password = document.getElementById("new_password").value;

  try {
    const res = await adminFetch("/admin/users", {
      method: "POST",
      body: JSON.stringify({ username, password, display_name }),
    });
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      throw new Error(body.detail || `追加に失敗しました (HTTP ${res.status})`);
    }
    document.getElementById("create-form").reset();
    loadUsers();
  } catch (err) {
    errorEl.textContent = err.message;
    errorEl.style.display = "block";
  }
});

(async () => {
  await loadCurrentUser();
  await loadUsers();
})();
</script>

</body>
</html>
