<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>データ更新 - いぬきんじょ管理画面</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="admin.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

<div class="admin-container" style="max-width:1300px;">
  <h1 style="font-size:1.4rem;">データ更新（地域資源）</h1>
  <p style="color:#6b7280; font-size:0.9rem;">
    マップを移動・ズームすると、その表示範囲内の地域資源がピンで表示されます。
    ピンをクリックすると詳細を編集・削除できます。
  </p>

  <div id="error" class="admin-error" style="display:none;"></div>

  <div class="admin-card">
    <div style="display:flex; gap:1.2rem; flex-wrap:wrap;">
      <div style="flex:2; min-width:320px;">
        <div id="map"></div>
      </div>
      <div style="flex:1; min-width:280px;">
        <h2 style="font-size:1rem; margin-top:0;" id="edit-title">地域資源を選択してください</h2>
        <form id="edit-form" class="admin-form" style="display:none;">
          <label>名称</label>
          <input id="f_name" type="text" required />
          <label>カテゴリ</label>
          <input id="f_category" type="text" required />
          <label>説明文</label>
          <textarea id="f_description" rows="4" required></textarea>
          <label>市町村</label>
          <input id="f_municipality" type="text" placeholder="例: 渋谷区" />
          <div style="display:flex; gap:0.8rem;">
            <div style="flex:1;">
              <label>緯度</label>
              <input id="f_lat" type="number" step="0.000001" required />
            </div>
            <div style="flex:1;">
              <label>経度</label>
              <input id="f_lng" type="number" step="0.000001" required />
            </div>
          </div>
          <p style="font-size:0.75rem; color:#6b7280;">
            緯度・経度を変更する場合は、マップ上でピンをドラッグしても更新できます。
          </p>
          <div style="display:flex; gap:0.6rem; margin-top:1rem;">
            <button type="submit" class="admin-btn">保存</button>
            <button type="button" id="delete-btn" class="admin-btn danger">削除</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="common.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
requireLogin();
renderAdminNav("resources");

const map = L.map("map").setView([35.68, 139.76], 12);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "&copy; OpenStreetMap contributors",
  maxZoom: 19,
}).addTo(map);

let markers = {}; // resource_id -> L.Marker
let selectedId = null;

function showError(message) {
  const el = document.getElementById("error");
  el.textContent = message;
  el.style.display = "block";
}
function clearError() {
  document.getElementById("error").style.display = "none";
}

async function loadResourcesInView() {
  clearError();
  const bounds = map.getBounds();
  try {
    const res = await adminFetch(
      "/admin/resources?" +
        new URLSearchParams({
          min_latitude: bounds.getSouth(),
          min_longitude: bounds.getWest(),
          max_latitude: bounds.getNorth(),
          max_longitude: bounds.getEast(),
          limit: 200,
        })
    );
    if (!res.ok) throw new Error(`一覧の取得に失敗しました (HTTP ${res.status})`);
    const data = await res.json();

    // 現在表示中のマーカーをクリアしてから再描画する。
    Object.values(markers).forEach((m) => map.removeLayer(m));
    markers = {};

    for (const r of data.resources) {
      const marker = L.marker([r.latitude, r.longitude], { draggable: true }).addTo(map);
      marker.bindTooltip(r.name);
      marker.on("click", () => selectResource(r));
      marker.on("dragend", async (e) => {
        const pos = e.target.getLatLng();
        await saveResource(r.resource_id, { latitude: pos.lat, longitude: pos.lng });
        loadResourcesInView();
      });
      markers[r.resource_id] = marker;
      marker._resourceData = r;
    }
  } catch (err) {
    showError(err.message);
  }
}

function selectResource(r) {
  selectedId = r.resource_id;
  document.getElementById("edit-title").textContent = r.name;
  document.getElementById("edit-form").style.display = "block";
  document.getElementById("f_name").value = r.name;
  document.getElementById("f_category").value = r.category;
  document.getElementById("f_description").value = r.description;
  document.getElementById("f_municipality").value = r.municipality || "";
  document.getElementById("f_lat").value = r.latitude;
  document.getElementById("f_lng").value = r.longitude;
}

async function saveResource(resourceId, partialBody) {
  clearError();
  try {
    const res = await adminFetch(`/admin/resources/${resourceId}`, {
      method: "PATCH",
      body: JSON.stringify(partialBody),
    });
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      throw new Error(body.detail || `更新に失敗しました (HTTP ${res.status})`);
    }
    return await res.json();
  } catch (err) {
    showError(err.message);
    throw err;
  }
}

document.getElementById("edit-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  if (!selectedId) return;
  try {
    await saveResource(selectedId, {
      name: document.getElementById("f_name").value,
      category: document.getElementById("f_category").value,
      description: document.getElementById("f_description").value,
      municipality: document.getElementById("f_municipality").value,
      latitude: parseFloat(document.getElementById("f_lat").value),
      longitude: parseFloat(document.getElementById("f_lng").value),
    });
    loadResourcesInView();
  } catch (err) {
    // saveResource内でエラー表示済み
  }
});

document.getElementById("delete-btn").addEventListener("click", async () => {
  if (!selectedId) return;
  if (!confirm("この地域資源を削除しますか？この操作は取り消せません。")) return;
  clearError();
  try {
    const res = await adminFetch(`/admin/resources/${selectedId}`, { method: "DELETE" });
    if (!res.ok && res.status !== 204) {
      const body = await res.json().catch(() => ({}));
      throw new Error(body.detail || `削除に失敗しました (HTTP ${res.status})`);
    }
    selectedId = null;
    document.getElementById("edit-form").style.display = "none";
    document.getElementById("edit-title").textContent = "地域資源を選択してください";
    loadResourcesInView();
  } catch (err) {
    showError(err.message);
  }
});

map.on("moveend", loadResourcesInView);
loadResourcesInView();
</script>

</body>
</html>
