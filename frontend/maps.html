area: '60 ㎡'
}
};

document.querySelectorAll('.map-pin').forEach(pin => {
pin.addEventListener('click', function(e) {
e.stopPropagation();
const propertyId = this.getAttribute('data-property');
const property = properties[propertyId];
const popup = document.getElementById('property-popup');
document.getElementById('popup-image').src = property.image;
document.getElementById('popup-title').textContent = property.title;
document.getElementById('popup-badge').textContent = property.badge;
document.getElementById('popup-badge').className = `px-3 py-1 ${property.badgeColor} text-xs font-medium rounded-full`;
document.getElementById('popup-rent').textContent = property.rent;
document.getElementById('popup-area').textContent = property.area;
const rect = this.getBoundingClientRect();
const mainRect = this.closest('main').getBoundingClientRect();
popup.style.left = (rect.left - mainRect.left - 140) + 'px';
popup.style.top = (rect.top - mainRect.top - 380) + 'px';
popup.classList.remove('hidden');
});
});

function closePopup() {
document.getElementById('property-popup').classList.add('hidden');
}

document.querySelector('main').addEventListener('click', function(e) {
if (!e.target.closest('.map-pin') && !e.target.closest('#property-popup')) {
closePopup();
}
});
